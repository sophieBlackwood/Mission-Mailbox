<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Stahmann | Mission Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <div class="envelope-wrapper" id="envelope">
            
            <div class="stamp-label">✉</div>
            <div class="address-text">
                Elder Dallin Stahmann<br>
                <span class="click-hint">Click to open</span>
            </div>

            <div class="envelope-front"></div>

            <div class="letter" id="letter">
                <h1>Elder Stahmann's Mission Archive</h1>
                
                <h3 class="section-title">Weekly Emails</h3>
                <div class="email-grid">
                    <a href="#" class="email-link">Week 1</a>
                    <a href="#" class="email-link">Week 2</a>
                    <a href="#" class="email-link">Week 3</a>
                    <a href="#" class="email-link">Week 4</a>
                    <a href="#" class="email-link">Week 5</a>
                    <a href="#" class="email-link">Week 6</a>
                    <a href="#" class="email-link">Week 7</a>
                    <a href="#" class="email-link">Week 8</a>
                </div>

                <h3 class="section-title">Photos</h3>
                <div class="photo-gallery">
                    
                    <div class="photo-card" style="--r: -2;">
                        <img src="https://via.placeholder.com/200" alt="Mission Photo">
                        <div class="photo-caption">MTC</div>
                    </div>

                    <div class="photo-card" style="--r: 1;">
                        <img src="https://via.placeholder.com/200" alt="Mission Photo">
                        <div class="photo-caption">First Area</div>
                    </div>

                    <div class="photo-card" style="--r: -1;">
                        <img src="https://via.placeholder.com/200" alt="Mission Photo">
                        <div class="photo-caption">Zone Conference</div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
